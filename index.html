<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusoy Dos 5-Card HUD - Spatial Navigation</title>
    
    <!-- Tailwind CSS for rapid HUD styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #000000; /* Renders transparent on waveguide displays */
            color: #ffffff; 
            overflow: hidden; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            user-select: none;
        }
        
        #mrbd-viewport {
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #042f1a 0%, #000000 85%); 
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .card-selected {
            transform: translateY(-12px);
            box-shadow: 0 0 15px 3px #22c55e;
            border-color: #22c55e;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CARD ENGINE DATA LAYER ---
        class Card {
            constructor(rank, suit) {
                this.rank = rank;
                this.suit = suit;
                this.value = rank * 10 + suit; 
                const suits = ['♣', '♠', '♥', '♦'];
                const ranks = {11:'J', 12:'Q', 13:'K', 14:'A', 15:'2'};
                this.label = (ranks[rank] || rank) + suits[suit];
                this.isRed = suit === 2 || suit === 3;
            }
        }

        const createDeck = () => {
            let deck = [];
            for (let r = 3; r <= 15; r++) {
                for (let s = 0; s <= 3; s++) deck.push(new Card(r, s));
            }
            return deck.sort(() => Math.random() - 0.5);
        };

        const evaluate5CardHand = (cards) => {
            if (cards.length !== 5) return null;
            const sorted = [...cards].sort((a, b) => a.value - b.value);
            const ranks = sorted.map(c => c.rank);
            const suits = sorted.map(c => c.suit);
            
            const isFlush = suits.every(s => s === suits[0]);
            let isStraight = true;
            for (let i = 0; i < 4; i++) {
                if (ranks[i+1] !== ranks[i] + 1) isStraight = false;
            }

            const counts = {};
            ranks.forEach(r => counts[r] = (counts[r] || 0) + 1);
            const freq = Object.values(counts).sort((a, b) => b - a);
            const rankKeys = Object.keys(counts).map(Number).sort((a,b) => counts[b] - counts[a] || b - a);

            if (isStraight && isFlush) return { name: "Straight Flush", tier: 5, score: 5000 + sorted[4].value };
            if (freq[0] === 4) return { name: "Four of a Kind", tier: 4, score: 4000 + sorted.filter(c => c.rank === rankKeys[0]).sort((a,b)=>b.value-a.value)[0].value };
            if (freq[0] === 3 && freq[1] === 2) return { name: "Full House", tier: 3, score: 3000 + sorted.filter(c => c.rank === rankKeys[0]).sort((a,b)=>b.value-a.value)[0].value };
            if (isFlush) return { name: "Flush", tier: 2, score: 2000 + sorted[4].value };
            if (isStraight) return { name: "Straight", tier: 1, score: 1000 + sorted[4].value };
            
            return null;
        };

        const getCombinations = (array, k) => {
            const result = [];
            const helper = (start, combo) => {
                if (combo.length === k) { result.push([...combo]); return; }
                for (let i = start; i < array.length; i++) {
                    combo.push(array[i]); helper(i + 1, combo); combo.pop();
                }
            };
            helper(0, []); return result;
        };

        const getCombosOfSize = (hand, size) => {
            let counts = {};
            hand.forEach(c => { counts[c.rank] = counts[c.rank] || []; counts[c.rank].push(c); });
            let combos = [];
            Object.values(counts).forEach(group => { if(group.length >= size) combos.push(group.slice(0, size)); });
            return combos.sort((a, b) => a[a.length-1].value - b[b.length-1].value);
        };

        const getValidPlays = (hand, currentTable) => {
            if (currentTable.length === 0) {
                const singles = hand.map(c => [c]);
                const pairs = getCombosOfSize(hand, 2);
                const triples = getCombosOfSize(hand, 3);
                const fiveCardCombos = [];
                if (hand.length >= 5) {
                    getCombinations(hand, 5).forEach(subset => { if (evaluate5CardHand(subset)) fiveCardCombos.push(subset); });
                }
                return [...singles, ...pairs, ...triples, ...fiveCardCombos];
            }
            const reqSize = currentTable.length;
            if (reqSize === 1) return hand.filter(c => c.value > currentTable[0].value).map(c => [c]);
            if (reqSize === 2 || reqSize === 3) {
                return getCombosOfSize(hand, reqSize).filter(combo => combo[combo.length-1].value > currentTable[currentTable.length-1].value);
            }
            if (reqSize === 5) {
                const tableEval = evaluate5CardHand(currentTable);
                if (!tableEval) return [];
                const targetCombos = [];
                getCombinations(hand, 5).forEach(subset => {
                    const currentEval = evaluate5CardHand(subset);
                    if (currentEval) {
                        if (currentEval.tier > tableEval.tier || (currentEval.tier === tableEval.tier && currentEval.score > tableEval.score)) {
                            targetCombos.push(subset);
                        }
                    }
                });
                return targetCombos;
            }
            return [];
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [gameState, setGameState] = useState('MENU'); 
            const [difficulty, setDifficulty] = useState('NORMAL');
            const [hands, setHands] = useState([[], [], [], []]); 
            const [table, setTable] = useState([]);
            const [turn, setTurn] = useState(0);
            const [lastPlayedTurn, setLastPlayedTurn] = useState(-1);
            const [selectedCards, setSelectedCards] = useState([]);
            const [logs, setLogs] = useState("Awaiting command Link...");

            // Spatial Coordinates Framework States
            const [menuFocus, setMenuFocus] = useState(1); // 0: Easy, 1: Normal, 2: Tirador
            const [focusZone, setFocusZone] = useState('HAND'); // 'HAND' or 'BUTTONS'
            const [focusedCardIdx, setFocusedCardIdx] = useState(0);
            const [focusedBtnIdx, setFocusedBtnIdx] = useState(1); // 0: PASS, 1: PLAY

            // Scroll alignment reference anchor
            const cardContainerRef = useRef(null);

            // Centering element logic for micro displays
            useEffect(() => {
                if (focusZone === 'HAND' && gameState === 'PLAYING') {
                    const focusedEl = document.getElementById(`card-${focusedCardIdx}`);
                    if (focusedEl) {
                        focusedEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                }
            }, [focusedCardIdx, focusZone, gameState]);

            // Keyboard/Hardware Integration Matrix
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (gameState === 'MENU') {
                        if (e.key === 'ArrowUp') {
                            e.preventDefault();
                            setMenuFocus(prev => Math.max(0, prev - 1));
                        } else if (e.key === 'ArrowDown') {
                            e.preventDefault();
                            setMenuFocus(prev => Math.min(2, prev + 1));
                        } else if (e.key === 'Enter') {
                            const tiers = ['EASY', 'NORMAL', 'TIRADOR'];
                            startGame(tiers[menuFocus]);
                        }
                    } 
                    
                    else if (gameState === 'PLAYING') {
                        if (e.key === 'Escape') {
                            if (selectedCards.length > 0) {
                                setSelectedCards([]);
                            } else {
                                setGameState('MENU');
                            }
                            return;
                        }

                        if (turn !== 0) return; // Prevent interruption during AI clock operational states

                        if (focusZone === 'HAND') {
                            if (e.key === 'ArrowLeft') {
                                e.preventDefault();
                                setFocusedCardIdx(prev => Math.max(0, prev - 1));
                            } else if (e.key === 'ArrowRight') {
                                e.preventDefault();
                                setFocusedCardIdx(prev => Math.min(hands[0].length - 1, prev + 1));
                            } else if (e.key === 'ArrowUp') {
                                e.preventDefault();
                                if (hands[0].length > 0) setFocusZone('BUTTONS');
                            } else if (e.key === 'Enter') {
                                if (hands[0][focusedCardIdx]) {
                                    toggleCard(hands[0][focusedCardIdx]);
                                }
                            }
                        } 
                        
                        else if (focusZone === 'BUTTONS') {
                            if (e.key === 'ArrowLeft') {
                                e.preventDefault();
                                setFocusedBtnIdx(0); // Shift focus to PASS
                            } else if (e.key === 'ArrowRight') {
                                e.preventDefault();
                                setFocusedBtnIdx(1); // Shift focus to PLAY
                            } else if (e.key === 'ArrowDown') {
                                e.preventDefault();
                                setFocusZone('HAND');
                            } else if (e.key === 'Enter') {
                                if (focusedBtnIdx === 0) handlePass();
                                else handlePlay();
                            }
                        }
                    } 
                    
                    else if (gameState === 'GAMEOVER') {
                        if (e.key === 'Enter' || e.key === 'Escape') {
                            setGameState('MENU');
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [gameState, menuFocus, focusZone, focusedCardIdx, focusedBtnIdx, hands, turn, selectedCards]);

            const startGame = (diff) => {
                const deck = createDeck();
                const newHands = [deck.slice(0,13), deck.slice(13,26), deck.slice(26,39), deck.slice(39,52)];
                newHands.forEach(h => h.sort((a,b) => a.value - b.value));
                
                let startingPlayer = newHands.findIndex(h => h.some(c => c.value === 30));
                
                setDifficulty(diff);
                setHands(newHands);
                setTable([]);
                setTurn(startingPlayer);
                setLastPlayedTurn(startingPlayer);
                setFocusedCardIdx(0);
                setFocusZone('HAND');
                setGameState('PLAYING');
                setLogs(`P${startingPlayer === 0 ? 'You' : startingPlayer} goes first (holds 3♣).`);
            };

            const nextTurn = (playedCards, playerIdx) => {
                if (playedCards) {
                    setTable(playedCards);
                    setLastPlayedTurn(playerIdx);
                    
                    const newHands = [...hands];
                    newHands[playerIdx] = newHands[playerIdx].filter(c => !playedCards.includes(c));
                    setHands(newHands);

                    if (newHands[playerIdx].length === 0) {
                        setGameState('GAMEOVER');
                        setLogs(playerIdx === 0 ? "🏆 YOU WIN!" : `💀 AI ${playerIdx} WINS!`);
                        return;
                    }
                }

                let nextIdx = (playerIdx + 1) % 4;
                if (nextIdx === lastPlayedTurn && !playedCards) {
                    setTable([]);
                    setLogs(`Everyone passed. Free turn for P${lastPlayedTurn === 0 ? 'You' : lastPlayedTurn}.`);
                }
                
                setSelectedCards([]);
                
                // Recalibrate user boundary matrix safely
                if (nextIdx === 0) {
                    setFocusedCardIdx(0);
                    setFocusZone('HAND');
                }
                setTurn(nextIdx);
            };

            // AI Logic Matrix
            useEffect(() => {
                if (gameState !== 'PLAYING' || turn === 0) return;

                const timer = setTimeout(() => {
                    const aiHand = hands[turn];
                    const isFreeTurn = lastPlayedTurn === turn || table.length === 0;
                    const validPlays = getValidPlays(aiHand, isFreeTurn ? [] : table);

                    let forcedPlays = validPlays;
                    if (aiHand.some(c => c.value === 30) && table.length === 0) {
                        forcedPlays = validPlays.filter(combo => combo.some(c => c.value === 30));
                    }

                    if (forcedPlays.length === 0) {
                        setLogs(`AI ${turn} passed.`);
                        nextTurn(null, turn);
                        return;
                    }

                    let chosenPlay;
                    if (difficulty === 'EASY') {
                        chosenPlay = forcedPlays[0]; 
                    } else if (difficulty === 'NORMAL') {
                        const midIndex = Math.max(1, Math.floor(forcedPlays.length / 2));
                        chosenPlay = forcedPlays[Math.floor(Math.random() * midIndex)];
                    } else if (difficulty === 'TIRADOR') {
                        const fiveCardPlays = forcedPlays.filter(p => p.length === 5);
                        if (fiveCardPlays.length > 0 && isFreeTurn) {
                            chosenPlay = fiveCardPlays[fiveCardPlays.length - 1]; 
                        } else {
                            chosenPlay = forcedPlays[forcedPlays.length - 1]; 
                        }
                    }

                    let announce = `AI ${turn} played `;
                    if (chosenPlay.length === 5) announce += `${evaluate5CardHand(chosenPlay).name}: `;
                    announce += chosenPlay.map(c=>c.label).join(', ');

                    setLogs(announce);
                    nextTurn(chosenPlay, turn);
                }, 1600);

                return () => clearTimeout(timer);
            }, [turn, gameState]);

            const toggleCard = (card) => {
                if (selectedCards.includes(card)) {
                    setSelectedCards(selectedCards.filter(c => c !== card));
                } else {
                    if (selectedCards.length >= 5) return; 
                    setSelectedCards([...selectedCards, card].sort((a,b) => a.value - b.value));
                }
            };

            const handlePlay = () => {
                if (turn !== 0 || selectedCards.length === 0) return;
                const len = selectedCards.length;

                if (len !== 1 && len !== 2 && len !== 3 && len !== 5) {
                    setLogs("Invalid selection size! Play 1, 2, 3, or 5 cards.");
                    return;
                }
                if (len < 5 && len > 1 && !selectedCards.every(c => c.rank === selectedCards[0].rank)) {
                    setLogs("Ranks must match for pairs/triples!");
                    return;
                }

                let userEval = null;
                if (len === 5) {
                    userEval = evaluate5CardHand(selectedCards);
                    if (!userEval) {
                        setLogs("Invalid structural configuration layout.");
                        return;
                    }
                }

                const isFreeTurn = lastPlayedTurn === 0 || table.length === 0;
                if (!isFreeTurn) {
                    if (len !== table.length) {
                        setLogs(`Table requires exactly ${table.length} cards.`);
                        return;
                    }
                    if (len < 5) {
                        if (selectedCards[len-1].value <= table[table.length-1].value) {
                            setLogs("Value execution parameters too low.");
                            return;
                        }
                    } else {
                        const tableEval = evaluate5CardHand(table);
                        const beatsTier = userEval.tier > tableEval.tier;
                        const tiesTierBeatsScore = (userEval.tier === tableEval.tier) && (userEval.score > tableEval.score);
                        if (!beatsTier && !tiesTierBeatsScore) {
                            setLogs(`Your ${userEval.name} fails to match table criteria.`);
                            return;
                        }
                    }
                } else if (hands[0].some(c => c.value === 30) && !selectedCards.some(c => c.value === 30)) {
                    setLogs("Opening play must include the 3♣.");
                    return;
                }

                let displayLog = `You dropped `;
                if (len === 5) displayLog += `${userEval.name}: `;
                displayLog += selectedCards.map(c=>c.label).join(', ');

                setLogs(displayLog);
                nextTurn(selectedCards, 0);
            };

            const handlePass = () => {
                if (turn !== 0) return;
                if (lastPlayedTurn === 0 || table.length === 0) {
                    setLogs("Cannot PASS on a free turn layout.");
                    return;
                }
                setLogs("You passed.");
                nextTurn(null, 0);
            };

            // --- RENDER PHASES ---
            if (gameState === 'MENU') {
                return (
                    <div id="mrbd-viewport" className="items-center justify-center space-y-6">
                        <h1 className="text-4xl font-bold text-emerald-400 tracking-wider text-center">PUSOY DOS <span className="block text-xs font-mono mt-1 text-white opacity-80">Select Difficutly</span></h1>
                        <p className="text-gray-400 text-[10px] font-mono tracking-widest text-center">Another App From MarinJitsu Studios</p>
                        <div className="flex flex-col space-y-3 w-64">
                            {['EASY', 'NORMAL', 'TIRADOR'].map((diff, idx) => {
                                const isFocused = menuFocus === idx;
                                return (
                                    <button 
                                        key={diff} 
                                        onClick={() => { setMenuFocus(idx); startGame(diff); }}
                                        className={`font-mono border py-3 text-sm font-bold tracking-widest transition-all duration-150 rounded-lg
                                            ${isFocused ? 'bg-emerald-500 text-black border-white ring-4 ring-emerald-400 scale-105 shadow-lg' : 'bg-black text-emerald-400 border-emerald-800 opacity-60'}
                                        `}
                                    >
                                        {isFocused ? `> ${diff} <` : diff}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            return (
                <div id="mrbd-viewport" className="justify-between p-4 relative">
                    {/* Diagnostic Ribbon */}
                    <div className="absolute top-2 left-2 text-[9px] font-mono text-emerald-500 bg-black bg-opacity-80 px-2 py-0.5 rounded border border-emerald-900">
                        MODE: {difficulty}
                    </div>

                    {/* Opponent Arrays */}
                    <div className="flex justify-between items-start mt-6">
                        {[1, 2, 3].map(aiIdx => (
                            <div key={aiIdx} className={`p-2 rounded border font-mono text-center min-w-[70px] transition-colors duration-200 ${turn === aiIdx ? 'border-emerald-400 bg-emerald-950 text-emerald-300' : 'border-gray-900 bg-black text-gray-600'}`}>
                                <div className="text-[9px]">COMP 0{aiIdx}</div>
                                <div className="font-bold text-sm">{hands[aiIdx]?.length} 🂠</div>
                            </div>
                        ))}
                    </div>

                    {/* Field Play Matrix */}
                    <div className="flex flex-col items-center justify-center flex-grow">
                        <div className="text-center text-[11px] mb-3 text-emerald-400 font-mono max-w-xs h-6 flex items-center justify-center tracking-wide">
                            {logs}
                        </div>
                        
                        <div className="flex space-x-1 bg-black bg-opacity-60 p-4 rounded-xl min-w-[240px] justify-center min-h-[100px] border border-emerald-950">
                            {table.length === 0 ? (
                                <span className="text-emerald-950 font-mono text-xs self-center tracking-widest animate-pulse">MATRIX EMPTY</span>
                            ) : (
                                table.map((c, i) => (
                                    <div key={i} className={`bg-gray-100 rounded w-10 h-14 flex flex-col items-center justify-center text-base font-black ${c.isRed ? 'text-red-600' : 'text-black'}`}>
                                        {c.label}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* Interactive Operational Command Layer */}
                    <div className={`flex flex-col space-y-2 p-3 rounded-xl border ${turn === 0 ? 'border-emerald-500 bg-emerald-950 bg-opacity-10' : 'border-gray-900 bg-black opacity-40'}`}>
                        <div className="flex justify-between items-center px-1 font-mono text-[10px]">
                            <span className="text-gray-500">USER HAND DECK [{hands[0].length}]</span>
                            {turn === 0 && <span className="text-emerald-400 font-bold tracking-wider animate-pulse">▲ YOUR TURN</span>}
                        </div>
                        
                        {/* Horizontal Matrix Viewport */}
                        <div ref={cardContainerRef} className="flex overflow-x-auto hide-scroll space-x-1.5 py-3 px-2">
                            {hands[0].map((c, i) => {
                                const isSelected = selectedCards.includes(c);
                                const isFocused = focusZone === 'HAND' && focusedCardIdx === i && turn === 0;
                                return (
                                    <button 
                                        id={`card-${i}`}
                                        key={i} 
                                        onClick={() => { if(turn===0){ setFocusZone('HAND'); setFocusedCardIdx(i); toggleCard(c); }}}
                                        className={`flex-shrink-0 w-11 h-15 rounded bg-gray-50 flex items-center justify-center text-lg font-black border-2 transition-all duration-150
                                            ${c.isRed ? 'text-red-600' : 'text-black'}
                                            ${isSelected ? 'card-selected' : 'border-transparent'}
                                            ${isFocused ? 'ring-4 ring-amber-400 border-white scale-110 z-10 shadow-lg' : ''}
                                        `}
                                    >
                                        {c.label}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Actuator Trigger System */}
                        <div className="flex space-x-2 font-mono">
                            <button 
                                onClick={handlePass}
                                disabled={turn !== 0}
                                className={`flex-1 border py-2 rounded text-xs font-bold tracking-widest transition-all duration-150
                                    ${focusZone === 'BUTTONS' && focusedBtnIdx === 0 && turn === 0 ? 'bg-amber-400 text-black border-white ring-4 ring-amber-300' : 'bg-black text-gray-400 border-gray-800'}
                                `}
                            >
                                PASS
                            </button>
                            <button 
                                onClick={handlePlay}
                                disabled={turn !== 0 || selectedCards.length === 0}
                                className={`flex-2 border py-2 px-4 rounded text-xs font-bold tracking-widest transition-all duration-150
                                    ${focusZone === 'BUTTONS' && focusedBtnIdx === 1 && turn === 0 ? 'bg-emerald-500 text-black border-white ring-4 ring-emerald-300' : 'bg-emerald-800 text-white border-emerald-600 disabled:opacity-20'}
                                `}
                            >
                                PLAY ({selectedCards.length})
                            </button>
                        </div>
                    </div>

                    {/* Game Terminated Overlay Layout */}
                    {gameState === 'GAMEOVER' && (
                        <div className="absolute inset-0 bg-black bg-opacity-95 flex flex-col items-center justify-center space-y-6 z-50">
                            <div className="text-3xl font-mono font-bold text-center tracking-wide text-emerald-400">{logs}</div>
                            <button 
                                onClick={() => setGameState('MENU')} 
                                className="bg-black text-emerald-400 font-mono border border-emerald-500 px-6 py-3 rounded text-sm tracking-widest ring-4 ring-emerald-400"
                            >
                                PRESS ENTER TO REBOOT
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
