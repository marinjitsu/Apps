<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusoy Dos 5-Card HUD - Meta Ray-Ban</title>
    
    <!-- Tailwind CSS for rapid HUD styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Wearable HUD Optimizations */
        body { 
            background-color: #000000; /* Renders transparent on waveguide displays */
            color: #ffffff; 
            overflow: hidden; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            touch-action: none; 
        }
        
        #mrbd-viewport {
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #042f1a 0%, #000000 85%); /* Enhanced Green Table */
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .card-selected {
            transform: translateY(-12px);
            box-shadow: 0 0 15px 3px #22c55e;
            border-color: #22c55e;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CORE CARD DATA CLASS ---
        // Suits: 0: ♣, 1: ♠, 2: ♥, 3: ♦
        // Ranks: 3-10, 11=J, 12=Q, 13=K, 14=A, 15=2
        class Card {
            constructor(rank, suit) {
                this.rank = rank;
                this.suit = suit;
                this.value = rank * 10 + suit; 
                const suits = ['♣', '♠', '♥', '♦'];
                const ranks = {11:'J', 12:'Q', 13:'K', 14:'A', 15:'2'};
                this.label = (ranks[rank] || rank) + suits[suit];
                this.isRed = suit === 2 || suit === 3;
            }
        }

        const createDeck = () => {
            let deck = [];
            for (let r = 3; r <= 15; r++) {
                for (let s = 0; s <= 3; s++) deck.push(new Card(r, s));
            }
            return deck.sort(() => Math.random() - 0.5);
        };

        // --- 5-CARD COMBINATIONS EVALUATOR ---
        const evaluate5CardHand = (cards) => {
            if (cards.length !== 5) return null;
            
            const sorted = [...cards].sort((a, b) => a.value - b.value);
            const ranks = sorted.map(c => c.rank);
            const suits = sorted.map(c => c.suit);
            
            const isFlush = suits.every(s => s === suits[0]);
            
            // Check Straight (handling sequence gaps)
            let isStraight = true;
            for (let i = 0; i < 4; i++) {
                if (ranks[i+1] !== ranks[i] + 1) isStraight = false;
            }

            // Frequency map
            const counts = {};
            ranks.forEach(r => counts[r] = (counts[r] || 0) + 1);
            const freq = Object.values(counts).sort((a, b) => b - a);
            const rankKeys = Object.keys(counts).map(Number).sort((a,b) => counts[b] - counts[a] || b - a);

            // Hand Tier Tiers: Straight=1, Flush=2, FullHouse=3, Quad=4, StraightFlush=5
            if (isStraight && isFlush) {
                return { name: "Straight Flush", tier: 5, score: 5000 + sorted[4].value, cards: sorted };
            }
            if (freq[0] === 4) {
                const quadRank = rankKeys[0];
                const maxQuadCard = sorted.filter(c => c.rank === quadRank).sort((a,b)=>b.value-a.value)[0];
                return { name: "Four of a Kind", tier: 4, score: 4000 + maxQuadCard.value, cards: sorted };
            }
            if (freq[0] === 3 && freq[1] === 2) {
                const tripleRank = rankKeys[0];
                const maxTripleCard = sorted.filter(c => c.rank === tripleRank).sort((a,b)=>b.value-a.value)[0];
                return { name: "Full House", tier: 3, score: 3000 + maxTripleCard.value, cards: sorted };
            }
            if (isFlush) {
                return { name: "Flush", tier: 2, score: 2000 + sorted[4].value, cards: sorted };
            }
            if (isStraight) {
                return { name: "Straight", tier: 1, score: 1000 + sorted[4].value, cards: sorted };
            }
            
            return null; // Not a valid combination
        };

        // Generate combinations helper for AI
        const getCombinations = (array, k) => {
            const result = [];
            const helper = (start, combo) => {
                if (combo.length === k) {
                    result.push([...combo]);
                    return;
                }
                for (let i = start; i < array.length; i++) {
                    combo.push(array[i]);
                    helper(i + 1, combo);
                    combo.pop();
                }
            };
            helper(0, []);
            return result;
        };

        const getCombosOfSize = (hand, size) => {
            let counts = {};
            hand.forEach(c => { counts[c.rank] = counts[c.rank] || []; counts[c.rank].push(c); });
            let combos = [];
            Object.values(counts).forEach(group => {
                if(group.length >= size) combos.push(group.slice(0, size));
            });
            return combos.sort((a, b) => a[a.length-1].value - b[b.length-1].value);
        };

        const getValidPlays = (hand, currentTable) => {
            if (currentTable.length === 0) {
                // Free turn combinations compilation
                const singles = hand.map(c => [c]);
                const pairs = getCombosOfSize(hand, 2);
                const triples = getCombosOfSize(hand, 3);
                
                const fiveCardCombos = [];
                if (hand.length >= 5) {
                    const subsets = getCombinations(hand, 5);
                    subsets.forEach(subset => {
                        const evalHand = evaluate5CardHand(subset);
                        if (evalHand) fiveCardCombos.push(subset);
                    });
                }
                return [...singles, ...pairs, ...triples, ...fiveCardCombos];
            }
            
            const reqSize = currentTable.length;
            
            if (reqSize === 1) {
                return hand.filter(c => c.value > currentTable[0].value).map(c => [c]);
            }
            if (reqSize === 2 || reqSize === 3) {
                const tableHighValue = currentTable[currentTable.length - 1].value;
                return getCombosOfSize(hand, reqSize).filter(combo => combo[combo.length-1].value > tableHighValue);
            }
            if (reqSize === 5) {
                const tableEval = evaluate5CardHand(currentTable);
                if (!tableEval) return [];
                
                const targetCombos = [];
                const subsets = getCombinations(hand, 5);
                
                subsets.forEach(subset => {
                    const currentEval = evaluate5CardHand(subset);
                    if (currentEval) {
                        if (currentEval.tier > tableEval.tier || (currentEval.tier === tableEval.tier && currentEval.score > tableEval.score)) {
                            targetCombos.push(subset);
                        }
                    }
                });
                return targetCombos;
            }
            return [];
        };

        // --- MAIN APPLICATION ---
        const App = () => {
            const [gameState, setGameState] = useState('MENU'); 
            const [difficulty, setDifficulty] = useState('NORMAL');
            const [hands, setHands] = useState([[], [], [], []]); 
            const [table, setTable] = useState([]);
            const [turn, setTurn] = useState(0);
            const [lastPlayedTurn, setLastPlayedTurn] = useState(-1);
            const [selectedCards, setSelectedCards] = useState([]);
            const [logs, setLogs] = useState("Awaiting command...");

            const startGame = (diff) => {
                const deck = createDeck();
                const newHands = [deck.slice(0,13), deck.slice(13,26), deck.slice(26,39), deck.slice(39,52)];
                newHands.forEach(h => h.sort((a,b) => a.value - b.value));
                
                let startingPlayer = newHands.findIndex(h => h.some(c => c.value === 30));
                
                setDifficulty(diff);
                setHands(newHands);
                setTable([]);
                setTurn(startingPlayer);
                setLastPlayedTurn(startingPlayer);
                setGameState('PLAYING');
                setLogs(`Game Started. Player ${startingPlayer === 0 ? 'You' : startingPlayer} goes first with 3♣.`);
            };

            const nextTurn = (playedCards, playerIdx) => {
                if (playedCards) {
                    setTable(playedCards);
                    setLastPlayedTurn(playerIdx);
                    
                    const newHands = [...hands];
                    newHands[playerIdx] = newHands[playerIdx].filter(c => !playedCards.includes(c));
                    setHands(newHands);

                    if (newHands[playerIdx].length === 0) {
                        setGameState('GAMEOVER');
                        setLogs(playerIdx === 0 ? "🏆 YOU WIN!" : `💀 AI ${playerIdx} WINS!`);
                        return;
                    }
                }

                let nextIdx = (playerIdx + 1) % 4;
                if (nextIdx === lastPlayedTurn && !playedCards) {
                    setTable([]);
                    setLogs(`Everyone passed. Free turn for Player ${lastPlayedTurn === 0 ? 'You' : lastPlayedTurn}.`);
                }
                
                setSelectedCards([]);
                setTurn(nextIdx);
            };

            // AI Execution Engine Loop
            useEffect(() => {
                if (gameState !== 'PLAYING' || turn === 0) return;

                const timer = setTimeout(() => {
                    const aiHand = hands[turn];
                    const isFreeTurn = lastPlayedTurn === turn || table.length === 0;
                    const validPlays = getValidPlays(aiHand, isFreeTurn ? [] : table);

                    let forcedPlays = validPlays;
                    if (aiHand.some(c => c.value === 30) && table.length === 0) {
                        forcedPlays = validPlays.filter(combo => combo.some(c => c.value === 30));
                    }

                    if (forcedPlays.length === 0) {
                        setLogs(`AI ${turn} passed.`);
                        nextTurn(null, turn);
                        return;
                    }

                    // Separation of strategy calculations
                    let chosenPlay;
                    if (difficulty === 'EASY') {
                        chosenPlay = forcedPlays[0]; 
                    } else if (difficulty === 'NORMAL') {
                        const midIndex = Math.max(1, Math.floor(forcedPlays.length / 2));
                        chosenPlay = forcedPlays[Math.floor(Math.random() * midIndex)];
                    } else if (difficulty === 'TIRADOR') {
                        // High-tier strategy priority processing
                        const fiveCardPlays = forcedPlays.filter(p => p.length === 5);
                        if (fiveCardPlays.length > 0 && isFreeTurn) {
                            chosenPlay = fiveCardPlays[fiveCardPlays.length - 1]; // Hit with strongest 5-card combo
                        } else {
                            chosenPlay = forcedPlays[forcedPlays.length - 1]; 
                        }
                    }

                    let announce = `AI ${turn} played `;
                    if (chosenPlay.length === 5) {
                        announce += `${evaluate5CardHand(chosenPlay).name}: `;
                    }
                    announce += chosenPlay.map(c=>c.label).join(', ');

                    setLogs(announce);
                    nextTurn(chosenPlay, turn);

                }, 1800);

                return () => clearTimeout(timer);
            }, [turn, gameState]);

            // User Trigger Systems
            const toggleCard = (card) => {
                if (turn !== 0) return;
                if (selectedCards.includes(card)) {
                    setSelectedCards(selectedCards.filter(c => c !== card));
                } else {
                    if (selectedCards.length >= 5) return; 
                    setSelectedCards([...selectedCards, card].sort((a,b) => a.value - b.value));
                }
            };

            const handlePlay = () => {
                if (turn !== 0 || selectedCards.length === 0) return;
                const len = selectedCards.length;

                if (len !== 1 && len !== 2 && len !== 3 && len !== 5) {
                    setLogs("Invalid selection size! Play 1, 2, 3, or 5 cards.");
                    return;
                }

                // 1, 2, 3 Card Match checks
                if (len < 5 && len > 1 && !selectedCards.every(c => c.rank === selectedCards[0].rank)) {
                    setLogs("Ranks must match for pairs/triples!");
                    return;
                }

                // 5-Card Structure Checks
                let userEval = null;
                if (len === 5) {
                    userEval = evaluate5CardHand(selectedCards);
                    if (!userEval) {
                        setLogs("Invalid combination layout! Not a valid poker hand.");
                        return;
                    }
                }

                const isFreeTurn = lastPlayedTurn === 0 || table.length === 0;
                if (!isFreeTurn) {
                    if (len !== table.length) {
                        setLogs(`Table sizing mismatch! You must drop exactly ${table.length} cards.`);
                        return;
                    }
                    
                    if (len < 5) {
                        if (selectedCards[len-1].value <= table[table.length-1].value) {
                            setLogs("Card value parameters are insufficient to pass table threshold.");
                            return;
                        }
                    } else {
                        // 5-Card comparison computation logic
                        const tableEval = evaluate5CardHand(table);
                        const beatsTier = userEval.tier > tableEval.tier;
                        const tiesTierBeatsScore = (userEval.tier === tableEval.tier) && (userEval.score > tableEval.score);
                        
                        if (!beatsTier && !tiesTierBeatsScore) {
                            setLogs(`Your ${userEval.name} does not beat table's ${tableEval.name}.`);
                            return;
                        }
                    }
                } else if (hands[0].some(c => c.value === 30) && !selectedCards.some(c => c.value === 30)) {
                    setLogs("Rule Bound Error: You must include 3♣ within your opening combination layout.");
                    return;
                }

                let displayLog = `You dropped `;
                if (len === 5) displayLog += `${userEval.name}: `;
                displayLog += selectedCards.map(c=>c.label).join(', ');

                setLogs(displayLog);
                nextTurn(selectedCards, 0);
            };

            const handlePass = () => {
                if (turn !== 0) return;
                if (lastPlayedTurn === 0 || table.length === 0) {
                    setLogs("Illegal Play: Cannot issue PASS operation on a free turn layout.");
                    return;
                }
                setLogs("You passed context to next terminal.");
                nextTurn(null, 0);
            };

            if (gameState === 'MENU') {
                return (
                    <div id="mrbd-viewport" className="items-center justify-center space-y-6">
                        <h1 className="text-4xl font-bold text-emerald-400 tracking-wider text-center">PUSOY DOS <span className="block text-xl text-white font-mono mt-1">5-CARD HUD EDITION</span></h1>
                        <p className="text-gray-400 text-xs font-mono tracking-widest">SELECT COMBAT TIER TO INITIALIZE LINK</p>
                        <div className="flex flex-col space-y-3 w-64">
                            {['EASY', 'NORMAL', 'TIRADOR'].map(diff => (
                                <button 
                                    key={diff} 
                                    onClick={() => startGame(diff)}
                                    className="bg-black border border-emerald-500 rounded-lg py-3 text-lg font-bold tracking-widest hover:bg-emerald-950 text-emerald-400 transition"
                                >
                                    {diff}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div id="mrbd-viewport" className="justify-between p-4 relative">
                    {/* Telemetry Tracking Ribbon */}
                    <div className="absolute top-2 left-2 text-[10px] font-mono text-emerald-500 bg-black bg-opacity-70 px-2 py-0.5 rounded border border-emerald-900">
                        MRBD LIVE // CORE-SYNC // MODE: {difficulty}
                    </div>

                    {/* Top Segment: Target Terminal Array */}
                    <div className="flex justify-between items-start mt-6">
                        {[1, 2, 3].map(aiIdx => (
                            <div key={aiIdx} className={`p-2 rounded border font-mono transition-colors duration-300 ${turn === aiIdx ? 'border-emerald-400 bg-emerald-950 bg-opacity-60 text-emerald-300' : 'border-gray-800 bg-black text-gray-500'}`}>
                                <div className="text-[10px]">COMP 0{aiIdx}</div>
                                <div className="font-bold text-base">{hands[aiIdx]?.length} 🂠</div>
                            </div>
                        ))}
                    </div>

                    {/* Center Segment: Active Matrix Field */}
                    <div className="flex flex-col items-center justify-center flex-grow">
                        <div className="text-center text-xs mb-3 text-emerald-400 font-mono max-w-xs h-8 flex items-center justify-center">
                            {logs}
                        </div>
                        
                        <div className="flex space-x-1.5 bg-black bg-opacity-50 p-4 rounded-xl min-w-[240px] justify-center min-h-[110px] border border-emerald-900 shadow-inner">
                            {table.length === 0 ? (
                                <span className="text-emerald-950 font-mono text-sm self-center tracking-widest animate-pulse">FIELD OPEN</span>
                            ) : (
                                table.map((c, i) => (
                                    <div key={i} className={`bg-gray-100 rounded shadow-md w-11 h-15 flex flex-col items-center justify-center text-lg font-black ${c.isRed ? 'text-red-600' : 'text-black'}`}>
                                        {c.label}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* Bottom Segment: Command Interface Deck */}
                    <div className={`flex flex-col space-y-3 p-3 rounded-xl border ${turn === 0 ? 'border-emerald-400 bg-emerald-950 bg-opacity-20 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : 'border-gray-900 bg-black bg-opacity-40'}`}>
                        <div className="flex justify-between items-center px-1 font-mono text-xs">
                            <span className="text-gray-400">INDEXED DECK [{hands[0].length}]</span>
                            {turn === 0 && <span className="text-emerald-400 font-bold tracking-widest animate-pulse">▲ YOUR ACTION EXECUTION</span>}
                        </div>
                        
                        {/* Interactive Horizontal Feed Matrix */}
                        <div className="flex overflow-x-auto hide-scroll space-x-1.5 py-2">
                            {hands[0].map((c, i) => {
                                const isSelected = selectedCards.includes(c);
                                return (
                                    <button 
                                        key={i} 
                                        onClick={() => toggleCard(c)}
                                        disabled={turn !== 0}
                                        className={`flex-shrink-0 w-11 h-15 rounded bg-gray-50 flex items-center justify-center text-lg font-black border-2 transition-all duration-150
                                            ${c.isRed ? 'text-red-600' : 'text-black'}
                                            ${isSelected ? 'card-selected' : 'border-transparent'}
                                            ${turn !== 0 ? 'opacity-30' : 'active:bg-gray-200'}
                                        `}
                                    >
                                        {c.label}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Tactical Actuator Matrix */}
                        <div className="flex space-x-2 font-mono">
                            <button 
                                onClick={handlePass}
                                disabled={turn !== 0}
                                className="flex-1 bg-black border border-gray-700 py-2.5 rounded text-xs font-bold text-gray-400 hover:text-white disabled:opacity-30 tracking-widest"
                            >
                                PASS
                            </button>
                            <button 
                                onClick={handlePlay}
                                disabled={turn !== 0 || selectedCards.length === 0}
                                className="flex-2 bg-emerald-700 border border-emerald-400 py-2.5 px-6 rounded text-xs font-bold text-white disabled:opacity-30 tracking-widest shadow-md active:bg-emerald-600"
                            >
                                EXECUTE PLAY ({selectedCards.length})
                            </button>
                        </div>
                    </div>

                    {/* Game Terminal Execution State Frame */}
                    {gameState === 'GAMEOVER' && (
                        <div className="absolute inset-0 bg-black bg-opacity-95 flex flex-col items-center justify-center space-y-6 z-50">
                            <div className="text-4xl font-mono font-bold text-center tracking-wide text-emerald-400">{logs}</div>
                            <button 
                                onClick={() => setGameState('MENU')} 
                                className="bg-black text-emerald-400 font-mono border border-emerald-500 px-6 py-3 rounded text-base tracking-widest hover:bg-emerald-950 transition"
                            >
                                RE-INITIALIZE GAME UNIT
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
